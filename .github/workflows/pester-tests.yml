name: ANAS APEX X - Automated Pester Testing CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  pester-tests:
    name: Execute Diagnostic Pester Unit Test Suite
    runs-on: windows-latest

    steps:
      # Step 1: Checkout the repository code
      - name: Checkout Repository
        uses: actions/checkout@v4

      # Step 2: Environment Diagnostics
      - name: Environment Diagnostics
        shell: powershell
        run: |
          Write-Host "================ ENVIRONMENT DIAGNOSTICS ================" -ForegroundColor Cyan
          Write-Host "1. PowerShell Version Table:" -ForegroundColor Yellow
          $PSVersionTable | Out-String | Write-Host
          
          Write-Host "2. Installed Pester Versions:" -ForegroundColor Yellow
          Get-Module Pester -ListAvailable | Format-Table Name, Version, Path | Out-String | Write-Host
          
          Write-Host "3. Current Working Directory:" -ForegroundColor Yellow
          (Get-Location).Path | Write-Host
          
          Write-Host "4. Currently Loaded Modules:" -ForegroundColor Yellow
          Get-Module | Format-Table Name, Version | Out-String | Write-Host
          Write-Host "==========================================================" -ForegroundColor Cyan

      # Step 3: Install & Setup Pester 5
      - name: Install & Setup Pester
        shell: powershell
        run: |
          Set-ExecutionPolicy -ExecutionPolicy Bypass -Scope Process -Force
          Install-Module -Name Pester -Force -SkipPublisherCheck -Scope CurrentUser -MinimumVersion 5.0.0
          Import-Module Pester -MinimumVersion 5.0.0 -Force

      # Step 4: Run Pester tests with Detailed output
      - name: Run Unit Tests with Diagnostics
        shell: powershell
        run: |
          Set-ExecutionPolicy -ExecutionPolicy Bypass -Scope Process -Force
          Write-Host "Executing Pester tests..." -ForegroundColor Cyan
          
          # Force import of Pester 5
          Import-Module Pester -MinimumVersion 5.0.0 -Force
          
          Write-Host "Pester Version in Session: $((Get-Module Pester).Version)" -ForegroundColor Yellow
          
          $testResult = Invoke-Pester -Path src/Tests/Unit/ -ExcludeTag "Integration" -PassThru
          
          if ($null -ne $testResult -and $testResult.FailedCount -gt 0) {
              Write-Error "CI Check Failed: $($testResult.FailedCount) Pester unit test(s) failed."
              exit 1
          }
          
          Write-Host "All Pester unit tests passed." -ForegroundColor Green

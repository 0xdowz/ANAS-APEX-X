name: ANAS APEX X - Automated Pester Testing CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  pester-tests:
    name: Execute Deterministic Pester Unit Test Suite
    runs-on: windows-latest

    steps:
      # Step 1: Checkout the repository code
      - name: Checkout Repository
        uses: actions/checkout@v4

      # Step 2: Install Pester 5.6.1, Import Pester 5.6.1, and Execute Pester tests in the same pwsh session
      - name: Run Deterministic Pester Unit Tests (Pester 5.6.1 Pinned)
        shell: pwsh
        run: |
          Set-ExecutionPolicy -ExecutionPolicy Bypass -Scope Process -Force
          
          # Install pinned Pester 5.6.1 module for CurrentUser
          if (-not (Get-Module -ListAvailable -Name Pester | Where-Object { $_.Version -eq '5.6.1' })) {
              Write-Host "Installing pinned Pester version 5.6.1..." -ForegroundColor Yellow
              Install-Module -Name Pester -RequiredVersion 5.6.1 -Force -SkipPublisherCheck -Scope CurrentUser
          }
          
          # Import pinned Pester 5.6.1 module into current session
          Import-Module -Name Pester -RequiredVersion 5.6.1 -Force
          
          $loadedPester = Get-Module Pester
          Write-Host "Loaded Pester Version: $($loadedPester.Version)" -ForegroundColor Cyan
          
          # Run deterministic Pester unit tests excluding integration tagged tests
          $testResult = Invoke-Pester -Path src/Tests/Unit/ -ExcludeTag "Integration" -PassThru
          
          Write-Host "Pester Test Results -> Total: $($testResult.TotalCount), Passed: $($testResult.PassedCount), Failed: $($testResult.FailedCount)" -ForegroundColor Cyan
          
          if ($null -ne $testResult -and $testResult.FailedCount -gt 0) {
              Write-Error "CI Check Failed: $($testResult.FailedCount) Pester unit test(s) failed."
              exit 1
          }
          
          Write-Host "All deterministic CI Pester unit tests passed successfully." -ForegroundColor Green
